<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Will You Be Mine? ❤️</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <!-- Confetti -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins',sans-serif;
    }

    body{
      height:100vh;
      overflow:hidden;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(135deg,#ff4e8a,#ff9a9e,#ffc3a0);
      position:relative;
      padding:20px;
    }

    /* Floating Hearts */
    .heart{
      position:absolute;
      color:rgba(255,255,255,0.7);
      animation:float 6s linear infinite;
      user-select:none;
    }

    @keyframes float{
      0%{
        transform:translateY(100vh) scale(0.5);
        opacity:0;
      }
      20%{
        opacity:1;
      }
      100%{
        transform:translateY(-120px) scale(1.5);
        opacity:0;
      }
    }

    .card{
      width:100%;
      max-width:450px;
      background:rgba(255,255,255,0.15);
      backdrop-filter:blur(12px);
      border-radius:25px;
      padding:35px 25px;
      text-align:center;
      color:white;
      box-shadow:0 10px 30px rgba(0,0,0,0.2);
      animation:fadeIn 1.5s ease;
      z-index:2;
    }

    @keyframes fadeIn{
      from{
        opacity:0;
        transform:translateY(20px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    h1{
      font-size:2.3rem;
      margin-bottom:15px;
    }

    p{
      font-size:1rem;
      line-height:1.8;
      margin-bottom:30px;
    }

    .buttons{
      display:flex;
      justify-content:center;
      gap:15px;
      flex-wrap:wrap;
      position:relative;
    }

    button{
      border:none;
      padding:12px 28px;
      border-radius:30px;
      font-size:1rem;
      cursor:pointer;
      transition:0.3s;
      font-weight:600;
    }

    #yesBtn{
      background:white;
      color:#ff4e8a;
    }

    #yesBtn:hover{
      transform:scale(1.08);
      background:#ffe6ee;
    }

    #noBtn{
      background:#ff1744;
      color:white;
      position:relative;
    }

    @media(max-width:500px){
      h1{
        font-size:1.9rem;
      }

      p{
        font-size:0.95rem;
      }
    }
  </style>
</head>
<body>

  <!-- Floating Hearts -->
  <script>
    for(let i=0;i<30;i++){
      let heart=document.createElement("div");
      heart.className="heart";
      heart.innerHTML="❤️";
      heart.style.left=Math.random()*100+"vw";
      heart.style.fontSize=(15+Math.random()*25)+"px";
      heart.style.animationDuration=(4+Math.random()*5)+"s";
      document.body.appendChild(heart);
    }
  </script>

  <div class="card">
    <h1>Heyy Pukulu</h1>
    <h2>❤️A Special Question❤️</h2>

    <p>
      From the moment you came into my life,  
      everything became more beautiful.  
      Your smile is my favorite thing in this world. 💖<br><br>

      So today, I just want to ask... 🌹
    </p>

    <h2 style="margin-bottom:25px;">Will You Be Mine Forever? ❤️</h2>

    <div class="buttons">
      <button id="yesBtn" onclick="accepted()">Yes ❤️</button>
      <button id="noBtn">No 😢</button>
    </div>
  </div>

  <script>
    const noBtn = document.getElementById("noBtn");

    // Move NO button away on hover
    noBtn.addEventListener("mouseover", () => {
      const x = Math.random() * (window.innerWidth - 100);
      const y = Math.random() * (window.innerHeight - 50);

      noBtn.style.position = "absolute";
      noBtn.style.left = `${x}px`;
      noBtn.style.top = `${y}px`;
    });

    function accepted(){

      // Confetti Celebration
      var duration = 4 * 1000;
      var end = Date.now() + duration;

      (function frame() {
        confetti({
          particleCount: 8,
          angle: 60,
          spread: 80,
          origin: { x: 0 }
        });

        confetti({
          particleCount: 8,
          angle: 120,
          spread: 80,
          origin: { x: 1 }
        });

        if (Date.now() < end) {
          requestAnimationFrame(frame);
        }
      })();

      document.querySelector(".card").innerHTML = `
        <h1>💖 Yayyyy! 💖</h1>
        <p style="font-size:1.1rem; line-height:1.8;">
          You just made me the happiest person alive ❤️<br><br>
          I promise to love you, care for you,
          and stay with you forever 🌹
        </p>
        <h2>I Love You Pukulu❤️</h2>
      `;
    }
  </script>

</body>
</html>
